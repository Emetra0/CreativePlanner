version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      COLLABORA_URL: ${COLLABORA_URL}
      WOPI_SECRET: ${WOPI_SECRET}
      WOPI_TOKEN_TTL_MS: ${WOPI_TOKEN_TTL_MS:-3600000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SELFHOST_DATA_DIR: ${SELFHOST_DATA_DIR:-/app/.wrangler/user-storage}
      SELFHOST_REPO_DIR: /workspace
    volumes:
      - backend_state:/app/.wrangler
      - backend_user_storage:/app/.wrangler/user-storage
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  collabora:
    image: collabora/code:24.04.13.2.1
    restart: unless-stopped
    cap_add:
      - MKNOD
    environment:
      domain: ${COLLABORA_DOMAIN}
      username: ${COLLABORA_ADMIN_USER:-admin}
      password: ${COLLABORA_ADMIN_PASSWORD}
      DONT_GEN_SSL_CERT: 'true'
      extra_params: --o:ssl.enable=false --o:ssl.termination=true

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_WORKER_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}
    depends_on:
      - backend
      - collabora
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  backend_state:
  backend_user_storage:
